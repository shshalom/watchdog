# Deterministic enforcement rules.
# These run in the pre-tool-use hook — no LLM involved, zero cost, zero latency.
# Place at .watchdog/rules.yml in your project.

rules:
  - id: no-force-unwrap
    type: file_pattern
    pattern: "\\!\\s*(\\.|$)"
    files: "**/*.swift"
    message: "Force unwraps prohibited — use guard/if let/nil-coalescing"

  - id: no-any-type
    type: file_pattern
    pattern: ":\\s*any\\b"
    files: "**/*.{ts,tsx}"
    message: "Use specific types instead of 'any'"

  - id: no-console-log
    type: file_pattern
    pattern: "console\\.log\\("
    files: "src/**/*.{ts,tsx,js,jsx}"
    message: "Use the structured logger, not console.log"

  - id: max-function-length
    type: max_lines_per_function
    max: 40
    files: "**/*.{ts,swift,rs,py}"
    message: "Functions over 40 lines — split into smaller units"

  - id: no-todo-in-merged
    type: file_pattern
    pattern: "TODO|FIXME"
    files: "**/*"
    message: "Remove TODO/FIXME before merging"
